name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Set up Java 17 (Zulu)
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Install dependencies
        run: npm ci

      - name: Generate native Android project
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Build release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
          cp app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/vibranceflow-release.apk

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: VibranceFlow-mobile-android-apk
          path: android/app/build/outputs/apk/release/vibranceflow-release.apk
          if-no-files-found: error
